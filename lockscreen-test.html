<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Jarvis — Agency Lock Protocol</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #f8f0d8;
            font-family: 'Georgia', serif;
            height: 100vh;
            position: relative;
            box-shadow: inset 0 0 140px rgba(139, 69, 19, 0.18);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .protocol {
            position: absolute;
            top: 38px;
            left: 58px;
            z-index: 20;
            font-size: 12.8px;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: #3c2f1f;
            opacity: 0.8;
        }

        .login-panel {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            background: #1f1f1f;
            border-radius: 14px;
            width: 360px;
            padding: 28px 24px 24px;
            box-shadow: 25px 25px 40px -10px rgb(0 0 0 / 0.35), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
            color: #f0e6d2;
        }

        .login-panel h2 {
            font-size: 12.5px;
            letter-spacing: 2.2px;
            text-transform: uppercase;
            margin-bottom: 14px;
            opacity: 0.75;
        }

        .login-panel input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px 16px;
            color: #c8b8a0;
            font-size: 15px;
            margin-bottom: 18px;
        }

        .login-panel button {
            width: 100%;
            height: 50px;
            background: #2c2c2c;
            border: 1px solid #8b5a2b;
            border-radius: 9999px;
            color: #f0e6d2;
            font-weight: 600;
            font-size: 14.5px;
            letter-spacing: 1.5px;
            cursor: pointer;
        }

        .login-panel button:hover {
            background: #3a3a3a;
            transform: translateY(-1px);
        }

        .login-panel p {
            text-align: center;
            font-size: 13px;
            opacity: 0.65;
            margin-top: 14px;
        }
    </style>
</head>

<body>

    <canvas id="canvas"></canvas>

    <div class="protocol">AGENCY LOCK PROTOCOL</div>

    <div class="login-panel">
        <h2>ADMIN PASSWORD</h2>
        <input type="password" placeholder="Enter Jarvis admin password">
        <button>UNLOCK JARVIS</button>
        <p>Enter the Jarvis admin password to continue.</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight;
        window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

        let segments = Array.from({ length: 80 }, (_, i) => ({ x: W * 0.28 + i * 7.5, y: H * 0.52, radius: 33 - i * 0.36 }));
        let particles = [];
        let lastHeadX = segments[0].x;
        let lastHeadY = segments[0].y;

        function emitFire(x, y, intensity) {
            if (intensity < 1.5) return;
            for (let i = 0; i < intensity; i++) {
                particles.push({ x: x + (Math.random() - 0.5) * 18, y: y + (Math.random() - 0.5) * 12, vx: (Math.random() - 0.7) * 6, vy: -Math.random() * 10 - 3, life: 38 + Math.random() * 18, size: 5 + Math.random() * 7, hue: 18 + Math.random() * 22 });
            }
        }

        let mouse = { x: W * 0.65, y: H * 0.45 };
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

        function circleInterval(cx, cy, r, bandTop, bandBot) {
            if (bandTop >= cy + r || bandBot <= cy - r) return null;
            const minDy = Math.max(0, Math.abs(cy - (bandTop + bandBot) / 2) - (bandBot - bandTop) / 2);
            if (minDy >= r) return null;
            const dx = Math.sqrt(r * r - minDy * minDy);
            return { left: cx - dx, right: cx + dx };
        }

        function carveSlots(left, right, blocked) {
            blocked.sort((a, b) => a.left - b.left);
            const slots = [];
            let cur = left;
            for (const b of blocked) {
                if (b.left > cur) slots.push({ left: cur, right: Math.min(b.left, right) });
                cur = Math.max(cur, b.right);
            }
            if (cur < right) slots.push({ left: cur, right });
            return slots.filter(s => s.right - s.left > 28);
        }

        const bodyText = "Within chamber, campaigns are refined, captions are gathered, and every brand voice stays held in memory until the operator returns to break the seal and move the work forward. Ideas bloom like ancient spells. Strategies are woven with care. Stories take shape in the quiet glow of the page, where every pixel and every word carries the weight of the next great campaign. The dragon watches. The words flow. The magic begins.";
        const words = bodyText.split(' ');

        function animate() {
            ctx.clearRect(0, 0, W, H);

            // Dragon physics
            segments[0].x += (mouse.x - segments[0].x) * 0.115;
            segments[0].y += (mouse.y - segments[0].y) * 0.115;
            for (let i = 1; i < segments.length; i++) {
                const dx = segments[i - 1].x - segments[i].x;
                const dy = segments[i - 1].y - segments[i].y;
                const dist = Math.hypot(dx, dy);
                if (dist > 6.2) {
                    segments[i].x = segments[i - 1].x - (dx / dist) * 6.2;
                    segments[i].y = segments[i - 1].y - (dy / dist) * 6.2;
                }
            }

            // Fire only when moving
            const vel = Math.hypot(segments[0].x - lastHeadX, segments[0].y - lastHeadY);
            emitFire(segments[0].x - 24, segments[0].y + 8, Math.min(vel * 0.8, 9));
            lastHeadX = segments[0].x;
            lastHeadY = segments[0].y;

            // Particles
            ctx.shadowBlur = 22;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.19; p.life--; p.size *= 0.94;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life / 42;
                ctx.fillStyle = `hsl(${p.hue}, 100%, 72%)`;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.shadowBlur = 0; ctx.globalAlpha = 1;

            // Dragon body (inked)
            ctx.fillStyle = '#1c1814';
            ctx.strokeStyle = '#0f0d0a';
            ctx.lineWidth = 4;
            for (let i = segments.length - 1; i >= 0; i--) {
                const s = segments[i];
                ctx.globalAlpha = i === 0 ? 1 : 0.97;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                if (i % 4 === 0 && i > 5) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius * 0.65, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            // Head + eye
            const head = segments[0];
            ctx.fillStyle = '#1c1814';
            ctx.beginPath();
            ctx.ellipse(head.x - 14, head.y, head.radius * 1.22, head.radius * 0.85, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#f8d030';
            ctx.beginPath(); ctx.arc(head.x + 14, head.y - 10, 8, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#111';
            ctx.beginPath(); ctx.arc(head.x + 16, head.y - 10, 3.8, 0, Math.PI * 2); ctx.fill();

            // ORANGE ILLUMINATED "J" + polished title
            ctx.shadowColor = '#ff9f1c';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#ff9f1c';
            ctx.font = 'bold 82px Georgia, serif';
            ctx.fillText("J", 68, 148);

            ctx.shadowBlur = 8;
            ctx.fillStyle = '#2c2118';
            ctx.fillText("arvis. For Marketing agencies and content.", 68 + 48, 148);
            ctx.shadowBlur = 0;

            // FULL NOTEBOOK BODY TEXT THAT PARTS AROUND DRAGON (manual reflow)
            ctx.font = '700 52px Georgia, serif';
            ctx.fillStyle = '#3c2f22';
            ctx.shadowColor = 'rgba(60,47,34,0.15)';
            ctx.shadowBlur = 6;

            const LINE_HEIGHT = 68;
            let wordIndex = 0;
            for (let y = 260; y < H - 80; y += LINE_HEIGHT) {
                const blocked = segments.map(seg => circleInterval(seg.x, seg.y, seg.radius + 22, y, y + LINE_HEIGHT)).filter(Boolean);
                const slots = carveSlots(68, W - 68, blocked);

                let x = 68;
                for (const slot of slots) {
                    let line = '';
                    while (wordIndex < words.length) {
                        const testLine = line + (line ? ' ' : '') + words[wordIndex];
                        const testWidth = ctx.measureText(testLine).width;
                        if (testWidth > slot.right - x && line) break;
                        line = testLine;
                        wordIndex++;
                        if (testWidth > slot.right - x) break;
                    }
                    if (line) {
                        ctx.fillText(line, x, y + LINE_HEIGHT / 2 + 4);
                        x += ctx.measureText(line).width + 20;
                    }
                }
            }
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
